<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aidanilchats PRO+</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e24; color: #fff; max-width: 500px; margin: 20px auto; padding: 20px; }
        h2 { text-align: center; color: #ffca28; margin-bottom: 5px; }
        .my-tag { text-align: center; color: #aaa; font-size: 0.9em; margin-bottom: 20px; }
        .my-tag span { color: #ffca28; font-weight: bold; background: #2a2a35; padding: 2px 6px; border-radius: 4px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex-grow: 1; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; text-transform: uppercase; }
        
        /* Стили для всплывающего инвайта */
        #invite-box { background: #f04747; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; font-weight: bold; }
        #invite-box button { background: #fff; color: #000; margin-left: 10px; padding: 5px 15px; }

        #chat-target-title { background: #5865f2; padding: 8px; border-radius: 6px 6px 0 0; font-weight: bold; display: none; text-align: center; }
        #chat { height: 350px; border: 1px solid #3a3a4a; overflow-y: auto; padding: 15px; background: #2a2a35; border-radius: 0 0 8px 8px; margin-bottom: 15px; display: none; }
        
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 80%; width: fit-content; }
        .msg.me { background: #5865f2; margin-left: auto; }
        .msg.other { background: #3a3a4a; margin-right: auto; }
        
        .controls { display: flex; gap: 10px; display: none; }
        #messageInput { flex-grow: 1; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; }
        #chat-status-text { text-align: center; color: #aaa; font-style: italic; margin-top: 10px; display: none; }
        
        button { padding: 10px 20px; background: #ffca28; color: #1e1e24; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ffe082; }
    </style>
</head>
<body>

    <h2>aidanilchats</h2>
    <div class="my-tag">Ваш уникальный тег: <span id="myTagLabel">....</span></div>
    
    <div id="invite-box">
        Пользователь <span id="inviter-name">XXXX</span> хочет начать чат!
        <button onclick="acceptInvite()">Принять</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchTagInput" maxlength="4" placeholder="Введите 4 буквы друга (например, WXYZ)">
        <button onclick="startChat()">Открыть чат</button>
    </div>

    <div id="chat-target-title">Чат с пользователем ....</div>
    <div id="chat"></div>
    
    <div id="chat-status-text">Ожидание, пока собеседник примет приглашение...</div>

    <div class="controls" id="inputControls">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">👉</button>
    </div>

    <script>
        // ⚠️ ВСТАВЬ СЮДА ССЫЛКУ НА СВОЮ БАЗУ (В конце СЛЭШ И НИКАКИХ messages.json!)
        const DB_BASE_URL = 'https://aidanilchats-default-rtdb.firebaseio.com/';

        let myTag = '';
        let targetTag = '';
        let currentChatId = '';
        let loopInterval = null;
        let activeInviteFrom = null; 

        const chatDiv = document.getElementById('chat');
        const msgInput = document.getElementById('messageInput');

        // 1. ИНИЦИАЛИЗАЦИЯ И РЕГИСТРАЦИЯ ПОЛЬЗОВАТЕЛЯ НА СЕРВЕРЕ
        async function initUser() {
            let savedTag = localStorage.getItem('aidanil_tag');
            if (!savedTag) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                savedTag = '';
                for (let i = 0; i < 4; i++) {
                    savedTag += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                localStorage.setItem('aidanil_tag', savedTag);
            }
            myTag = savedTag;
            document.getElementById('myTagLabel').textContent = myTag;

            // Регистрируем наш тег в глобальном списке пользователей на сервере Google
            await fetch(`${DB_BASE_URL}users/${myTag}.json`, {
                method: 'PUT',
                body: JSON.stringify({ active: true })
            });

            // Запускаем постоянный фоновый цикл (раз в секунду) для проверки инвайтов и новых сообщений
            loopInterval = setInterval(globalTick, 1000);
        }

        // 2. ГЛОБАЛЬНЫЙ ТИК (проверяет инвайты и обновляет чат)
        async function globalTick() {
            // А. Проверяем, не хочет ли кто-то с нами пообщаться (входящие инвайты)
            try {
                const res = await fetch(`${DB_BASE_URL}invites/${myTag}.json`);
                const inviteData = await res.json();
                
                if (inviteData && inviteData.status === 'pending') {
                    activeInviteFrom = inviteData.from;
                    document.getElementById('inviter-name').textContent = activeInviteFrom;
                    document.getElementById('invite-box').style.display = 'block';
                } else if (!inviteData) {
                    document.getElementById('invite-box').style.display = 'none';
                }
            } catch(e) {}

            // Б. Если у нас открыт чат — обновляем сообщения и проверяем статус подтверждения
            if (currentChatId) {
                checkChatStatusAndLoad();
            }
        }

        // 3. ОТКРЫТИЕ ЧАТА ПО ИНИЦИАТИВЕ ПОЛЬЗОВАТЕЛЯ (Кнопка "Открыть чат")
        async function startChat() {
            const inputTag = document.getElementById('searchTagInput').value.trim().toUpperCase();
            
            if (inputTag.length !== 4) {
                alert('Тег должен состоять ровно из 4 букв!');
                return;
            }
            if (inputTag === myTag) {
                alert('Нельзя открыть чат с самим собой!');
                return;
            }

            // БАГ 1: Проверяем, существует ли пользователь в базе данных
            const userCheck = await fetch(`${DB_BASE_URL}users/${inputTag}.json`);
            const userData = await userCheck.json();
            
            if (!userData) {
                alert(`Пользователь ${inputTag} не существует! Проверь правильность ввода.`);
                return;
            }

            targetTag = inputTag;
            currentChatId = [myTag, targetTag].sort().join('_');

            // Отправляем инвайт собеседнику (БАГ 2)
            await fetch(`${DB_BASE_URL}invites/${targetTag}.json`, {
                method: 'PUT',
                body: JSON.stringify({ from: myTag, status: 'pending' })
            });

            showChatUI();
        }

        // 4. ПРИНЯТИЕ ПРИГЛАШЕНИЯ (Кнопка "Принять")
        async function acceptInvite() {
            if (!activeInviteFrom) return;
            
            targetTag = activeInviteFrom;
            currentChatId = [myTag, targetTag].sort().join('_');

            // Меняем статус инвайта на принятый
            await fetch(`${DB_BASE_URL}invites/${myTag}.json`, {
                method: 'PUT',
                body: JSON.stringify({ from: targetTag, status: 'accepted' })
            });

            document.getElementById('invite-box').style.display = 'none';
            showChatUI();
        }

        // Вспомогательная функция для отображения каркаса чата
        function showChatUI() {
            document.getElementById('chat-target-title').style.display = 'block';
            document.getElementById('chat-target-title').textContent = `Чат с пользователем [${targetTag}]`;
            chatDiv.style.display = 'block';
            chatDiv.innerHTML = '';
            checkChatStatusAndLoad();
        }

        // 5. ПРОВЕРКА СТАТУСА ЧАТА И ЗАГРУЗКА
        async function checkChatStatusAndLoad() {
            // Проверяем статус инвайта у обоих участников
            const resMyInvite = await fetch(`${DB_BASE_URL}invites/${myTag}.json`);
            const myInviteData = await resMyInvite.json();
            
            const resTheirInvite = await fetch(`${DB_BASE_URL}invites/${targetTag}.json`);
            const theirInviteData = await res_TheirInviteData = await resTheirInvite.json();

            // Если хотя бы один принял приглашение или отправил его, смотрим статус
            let isAccepted = false;
            if (myInviteData && myInviteData.from === targetTag && myInviteData.status === 'accepted') isAccepted = true;
            if (theirInviteData && theirInviteData.from === myTag && theirInviteData.status === 'accepted') isAccepted = true;

            if (isAccepted) {
                // Если принято — открываем управление сообщениями
                document.getElementById('chat-status-text').style.display = 'none';
                document.getElementById('inputControls').style.display = 'flex';
                loadMessages(); // Грузим сообщения
            } else {
                // Если нет — прячем инпуты и пишем, что ждем
                document.getElementById('chat-status-text').style.display = 'block';
                document.getElementById('inputControls').style.display = 'none';
            }
        }

        // 6. ОТПРАВКА СООБЩЕНИЯ
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (text === '' || !currentChatId) return;

            msgInput.value = '';
            
            const url = `${DB_BASE_URL}chats/${currentChatId}.json`;
            try {
                await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        sender: myTag,
                        text: text,
                        timestamp: Date.now()
                    })
                });
            } catch (e) { console.error(e); }
        }

        // 7. РЕНДЕР СООБЩЕНИЙ
        async function loadMessages() {
            const url = `${DB_BASE_URL}chats/${currentChatId}.json`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                chatDiv.innerHTML = '';
                
                if (data) {
                    const sorted = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
                    sorted.forEach(msg => {
                        const msgHtml = document.createElement('div');
                        msgHtml.className = msg.sender === myTag ? 'msg me' : 'msg other';
                        msgHtml.innerHTML = `<div>${escapeHtml(msg.text)}</div>`;
                        chatDiv.appendChild(msgHtml);
                    });
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            } catch (e) { console.error(e); }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        initUser();

        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
