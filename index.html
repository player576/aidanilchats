<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aidanilchats</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1e1e24; 
            color: #fff; 
            max-width: 500px; 
            margin: 30px auto; 
            padding: 20px; 
        }
        h2 { 
            text-align: center; 
            color: #ffca28; 
            margin-bottom: 20px;
        }
        #chat { 
            height: 400px; 
            border: 1px solid #3a3a4a; 
            overflow-y: auto; 
            padding: 15px; 
            background: #2a2a35; 
            border-radius: 8px; 
            margin-bottom: 15px; 
        }
        .msg { 
            margin-bottom: 10px; 
            padding: 8px 12px; 
            background: #3a3a4a; 
            border-radius: 6px; 
        }
        .msg .author { 
            font-weight: bold; 
            color: #ffca28; 
            margin-bottom: 3px; 
            font-size: 0.9em; 
        }
        .controls { 
            display: flex; 
            gap: 10px; 
        }
        #nickInput { 
            width: 30%; 
            padding: 10px; 
            background: #2a2a35; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 6px; 
        }
        #messageInput { 
            flex-grow: 1; 
            padding: 10px; 
            background: #2a2a35; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 6px; 
        }
        button { 
            padding: 10px 20px; 
            background: #ffca28; 
            color: #1e1e24; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover {
            background: #ffe082;
        }
    </style>
</head>
<body>

    <h2>Мессенджер aidanilchats</h2>
    
    <div id="chat"></div>
    
    <div class="controls">
        <input type="text" id="nickInput" placeholder="Ник..." value="Пользователь">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">👉</button>
    </div>

    <script>
        // ⚠️ ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ ИЗ FIREBASE (не удаляй /messages.json в конце!)
        const DB_URL = 'https://aidanilchats-default-rtdb.firebaseio.com/messages.json';

        const chatDiv = document.getElementById('chat');
        const msgInput = document.getElementById('messageInput');
        const nickInput = document.getElementById('nickInput');

        // Функция отправки сообщения в Firebase
        async function sendMessage() {
            const text = msgInput.value.trim();
            const sender = nickInput.value.trim() || 'Аноним';

            if (text !== '') {
                msgInput.value = ''; // Очищаем поле ввода сразу для удобства
                try {
                    await fetch(DB_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            sender: sender, 
                            text: text, 
                            timestamp: Date.now() 
                        })
                    });
                } catch (e) {
                    console.error("Ошибка отправки:", e);
                }
            }
        }

        // Функция загрузки сообщений из Firebase
        async function loadMessages() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                
                chatDiv.innerHTML = ''; // Очищаем чат перед обновлением
                
                if (data) {
                    // Сортируем сообщения по времени, чтобы старые были сверху, новые снизу
                    const sorted = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
                    
                    sorted.forEach(msg => {
                        const msgHtml = document.createElement('div');
                        msgHtml.className = 'msg';
                        msgHtml.innerHTML = `<div class="author">${escapeHtml(msg.sender)}</div><div>${escapeHtml(msg.text)}</div>`;
                        chatDiv.appendChild(msgHtml);
                    });
                    chatDiv.scrollTop = chatDiv.scrollHeight; // Скроллим чат вниз
                }
            } catch (e) { 
                console.error("Ошибка загрузки:", e); 
            }
        }

        // Защита от опасного HTML-кода в сообщениях (XSS)
        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Запускаем проверку обновлений каждую секунду
        setInterval(loadMessages, 1000);
        
        // Первичная загрузка при открытии страницы
        loadMessages();

        // Отправка по нажатию кнопки Enter
        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
