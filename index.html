<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aidanilchats FINAL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e24; color: #fff; max-width: 500px; margin: 20px auto; padding: 20px; }
        h2 { text-align: center; color: #ffca28; margin-bottom: 5px; }
        .my-tag { text-align: center; color: #aaa; font-size: 0.9em; margin-bottom: 20px; }
        .my-tag span { color: #ffca28; font-weight: bold; background: #2a2a35; padding: 4px 10px; border-radius: 4px; border: 1px solid #444; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex-grow: 1; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; }
        
        #invite-box { background: #f04747; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; font-weight: bold; }
        #invite-box button { background: #fff; color: #000; margin-left: 10px; padding: 5px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #chat-target-title { background: #5865f2; padding: 8px; border-radius: 6px 6px 0 0; font-weight: bold; display: none; text-align: center; }
        #chat { height: 350px; border: 1px solid #3a3a4a; overflow-y: auto; padding: 15px; background: #2a2a35; border-radius: 0 0 8px 8px; margin-bottom: 15px; display: none; }
        
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 80%; width: fit-content; }
        .msg.me { background: #5865f2; margin-left: auto; }
        .msg.other { background: #3a3a4a; margin-right: auto; }
        
        .controls { display: flex; gap: 10px; display: none; }
        #messageInput { flex-grow: 1; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; }
        #chat-status-text { text-align: center; color: #aaa; font-style: italic; margin-top: 10px; display: none; }
        
        button { padding: 10px 20px; background: #ffca28; color: #1e1e24; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ffe082; }
    </style>
</head>
<body>

    <h2>aidanilchats</h2>
    <div class="my-tag">Ваш никнейм: <span id="myTagLabel">Загрузка...</span></div>
    
    <div id="invite-box">
        Пользователь <span id="inviter-name">XXXX</span> хочет начать чат!
        <button onclick="acceptInvite()">Принять</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchTagInput" placeholder="Введите никнейм друга для поиска...">
        <button onclick="startChat()">Найти и открыть</button>
    </div>

    <div id="chat-target-title">Чат с пользователем ....</div>
    <div id="chat"></div>
    
    <div id="chat-status-text">Ожидание, пока собеседник примет приглашение...</div>

    <div class="controls" id="inputControls">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">👉</button>
    </div>

    <script>
        // ⚠️ ВСТАВЬ СЮДА ССЫЛКУ НА СВОЮ БАЗУ (В конце СЛЭШ И НИКАКИХ messages.json!)
        const DB_BASE_URL = 'https://aidanilchats-default-rtdb.firebaseio.com/';

        let myTag = '';
        let targetTag = '';
        let currentChatId = '';
        let loopInterval = null;
        let activeInviteFrom = null; 

        const chatDiv = document.getElementById('chat');
        const msgInput = document.getElementById('messageInput');

        // 1. ЗАПРОС И РЕГИСТРАЦИЯ НИКНЕЙМА
        async function initUser() {
            let savedTag = localStorage.getItem('aidanil_custom_nickname');
            
            // Если ника нет в памяти браузера, запрашиваем его через всплывающее окно prompt
            while (!savedTag || savedTag.trim() === "") {
                savedTag = prompt("Добро пожаловать в aidanilchats!\nВведите ваш уникальный никнейм (любые буквы, цифры, символы):");
            }
            
            // Убираем лишние пробелы по краям
            myTag = savedTag.trim();
            document.getElementById('myTagLabel').textContent = myTag;
            localStorage.setItem('aidanil_custom_nickname', myTag);

            try {
                // Регистрируем ник в Firebase, чтобы другие могли нас найти
                // Используем encodeURIComponent на случай, если в нике есть спецсимволы или пробелы
                await fetch(`${DB_BASE_URL}users/${encodeURIComponent(myTag)}.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ active: true })
                });
            } catch (e) {
                console.error("Ошибка сети при регистрации:", e);
            }

            // Запускаем постоянный секундный таймер обновлений
            loopInterval = setInterval(globalTick, 1000);
        }

        // 2. ФОНОВЫЙ ТИК (Ловим инвайты и обновляем чат)
        async function globalTick() {
            if (!myTag) return;
            
            try {
                // Проверяем входящие приглашения для нашего ника
                const res = await fetch(`${DB_BASE_URL}invites/${encodeURIComponent(myTag)}.json`);
                const inviteData = await res.json();
                
                if (inviteData && inviteData.status === 'pending') {
                    activeInviteFrom = inviteData.from;
                    document.getElementById('inviter-name').textContent = activeInviteFrom;
                    document.getElementById('invite-box').style.display = 'block';
                } else if (!inviteData) {
                    document.getElementById('invite-box').style.display = 'none';
                }
            } catch(e) {}

            // Если открыт чат — обновляем статус одобрения и сообщения
            if (currentChatId) {
                checkChatStatusAndLoad();
            }
        }

        // 3. ОТКРЫТИЕ ЧАТА (Кнопка "Найти и открыть")
        async function startChat() {
            const inputTag = document.getElementById('searchTagInput').value.trim();
            
            if (!inputTag) {
                alert('Введите хоть какой-нибудь никнейм!');
                return;
            }
            if (inputTag === myTag) {
                alert('Нельзя открыть чат с самим собой!');
                return;
            }

            // БАГ 1 ИСПРАВЛЕН: Проверяем, существует ли этот ник в Firebase
            const userCheck = await fetch(`${DB_BASE_URL}users/${encodeURIComponent(inputTag)}.json`);
            const userData = await userCheck.json();
            
            if (!userData) {
                alert(`Пользователь "${inputTag}" не найден в мессенджере. Проверь буквы и пробелы!`);
                return;
            }

            targetTag = inputTag;
            // Создаем ID чата. Сортируем ники по алфавиту, чтобы у обоих ID совпал независимо от того, кто первый нашел друга
            currentChatId = [myTag, targetTag].sort().join('_');

            // БАГ 2 ИСПРАВЛЕН: Отправляем инвайт собеседнику на подтверждение
            await fetch(`${DB_BASE_URL}invites/${encodeURIComponent(targetTag)}.json`, {
                method: 'PUT',
                body: JSON.stringify({ from: myTag, status: 'pending' })
            });

            showChatUI();
        }

        // 4. ПРИНЯТИЕ ПРИГЛАШЕНИЯ (Кнопка "Принять")
        async function acceptInvite() {
            if (!activeInviteFrom) return;
            
            targetTag = activeInviteFrom;
            currentChatId = [myTag, targetTag].sort().join('_');

            // Меняем статус инвайта у себя на "accepted"
            await fetch(`${DB_BASE_URL}invites/${encodeURIComponent(myTag)}.json`, {
                method: 'PUT',
                body: JSON.stringify({ from: targetTag, status: 'accepted' })
            });

            document.getElementById('invite-box').style.display = 'none';
            showChatUI();
        }

        function showChatUI() {
            document.getElementById('chat-target-title').style.display = 'block';
            document.getElementById('chat-target-title').textContent = `Чат с пользователем [${targetTag}]`;
            chatDiv.style.display = 'block';
            chatDiv.innerHTML = '';
            checkChatStatusAndLoad();
        }

        // 5. МОНИТОРИНГ СТАТУСА ЧАТА И ЗАГРУЗКА
        async function checkChatStatusAndLoad() {
            try {
                const resMyInvite = await fetch(`${DB_BASE_URL}invites/${encodeURIComponent(myTag)}.json`);
                const myInviteData = await resMyInvite.json();
                
                const resTheirInvite = await fetch(`${DB_BASE_URL}invites/${encodeURIComponent(targetTag)}.json`);
                const theirInviteData = await resTheirInvite.json();

                let isAccepted = false;
                if (myInviteData && myInviteData.from === targetTag && myInviteData.status === 'accepted') isAccepted = true;
                if (theirInviteData && theirInviteData.from === myTag && theirInviteData.status === 'accepted') isAccepted = true;

                if (isAccepted) {
                    document.getElementById('chat-status-text').style.display = 'none';
                    document.getElementById('inputControls').style.display = 'flex';
                    loadMessages();
                } else {
                    document.getElementById('chat-status-text').style.display = 'block';
                    document.getElementById('inputControls').style.display = 'none';
                }
            } catch(e) {}
        }

        // 6. ОТПРАВКА СООБЩЕНИЯ
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (text === '' || !currentChatId) return;

            msgInput.value = '';
            
            const url = `${DB_BASE_URL}chats/${encodeURIComponent(currentChatId)}.json`;
            try {
                await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        sender: myTag,
                        text: text,
                        timestamp: Date.now()
                    })
                });
            } catch (e) { console.error(e); }
        }

        // 7. ЗАГРУЗКА И СОРТИРОВКА ХРОНОЛОГИИ
        async function loadMessages() {
            const url = `${DB_BASE_URL}chats/${encodeURIComponent(currentChatId)}.json`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                chatDiv.innerHTML = '';
                
                if (data) {
                    const sorted = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
                    sorted.forEach(msg => {
                        const msgHtml = document.createElement('div');
                        msgHtml.className = msg.sender === myTag ? 'msg me' : 'msg other';
                        msgHtml.innerHTML = `<div>${escapeHtml(msg.text)}</div>`;
                        chatDiv.appendChild(msgHtml);
                    });
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            } catch (e) { console.error(e); }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Запуск всей логики мессенджера
        initUser();

        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
