<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aidanilchats OS MOBILE FIXED</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e24; color: #fff; max-width: 500px; margin: 20px auto; padding: 20px; transition: background 0.1s ease; }
        #ban-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; color: black; z-index: 99999; display: none; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; text-align: center; padding: 20px; }
        h2 { text-align: center; color: #ffca28; margin-bottom: 5px; }
        .profile-box { background: #2a2a35; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .my-tag { color: #aaa; font-size: 0.9em; }
        .my-tag span { color: #ffca28; font-weight: bold; }
        .my-tag span.is-admin { color: #f04747; text-shadow: 0 0 5px rgba(240,71,71,0.5); }
        .btn-sm { padding: 4px 10px; background: #444; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .favorites-box { background: #2a2a35; padding: 12px; border-radius: 8px; border: 1px solid #3a3a4a; margin-bottom: 20px; }
        .favorites-box h4 { margin: 0 0 8px 0; color: #ffca28; font-size: 0.9em; text-transform: uppercase; }
        #favorites-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .fav-item { background: #3a3a4a; padding: 4px 10px; border-radius: 20px; font-size: 0.85em; cursor: pointer; border: 1px solid #555; }
        .fav-item:hover { background: #5865f2; border-color: #5865f2; }
        .fav-admin { border-color: #f04747; color: #ff8f8f; }
        #invite-box { background: #f04747; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; font-weight: bold; }
        #invite-box button { background: #fff; color: #000; margin-left: 10px; padding: 5px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex-grow: 1; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; }
        #chat-wrapper { position: relative; display: none; }
        #typing-status { background: rgba(255, 202, 40, 0.15); color: #ffca28; padding: 4px 12px; font-size: 0.85em; font-style: italic; border-left: 1px solid #ffca28; border-right: 1px solid #ffca28; display: none; }
        #chat { height: 300px; border: 1px solid #3a3a4a; overflow-y: auto; padding: 15px; background: #2a2a35; border-radius: 0 0 8px 8px; margin-bottom: 15px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 80%; width: fit-content; word-break: break-all; }
        .msg.me { background: #5865f2; margin-left: auto; }
        .msg.other { background: #3a3a4a; margin-right: auto; }
        .secret-locked { background: #443355 !important; border: 1px dashed #ffca28; cursor: pointer; font-style: italic; color: #ffd54f; }
        .secret-unlocked { background: #1b5e20 !important; border: 1px solid #4caf50; font-style: normal; color: #fff; }
        .controls { display: flex; gap: 10px; display: none; }
        #messageInput { flex-grow: 1; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; }
        #chat-status-text { text-align: center; color: #aaa; font-style: italic; margin-top: 10px; display: none; }
        button { padding: 10px 20px; background: #ffca28; color: #1e1e24; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onclick="initAudioOnFirstClick()"> <div id="ban-screen">Вы были заблокированы создателем! 💀</div>

    <h2>aidanilchats</h2>
    
    <div class="profile-box" onclick="handleAdminSecretClick()">
        <div class="my-tag">Вы вошли как: <span id="myTagLabel">Загрузка...</span></div>
        <button class="btn-sm" onclick="event.stopPropagation(); changeNicknameManual()">Изменить ник</button>
    </div>

    <div class="favorites-box">
        <h4>⭐ Избранные чаты (введите /friends в чате)</h4>
        <div id="favorites-list"></div>
    </div>
    
    <div id="invite-box">
        Пользователь <span id="inviter-name">XXXX</span> хочет начать чат!
        <button onclick="acceptInvite()">Принять</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchTagInput" placeholder="Введите никнейм друга для поиска...">
        <button onclick="startChatWithTag(document.getElementById('searchTagInput').value.trim())">Найти</button>
    </div>

    <div id="chat-wrapper">
        <div id="chat-target-title">Чат с пользователем ....</div>
        <div id="typing-status">✏️ Собеседник печатает...</div>
        <div id="chat"></div>
    </div>
    
    <div id="chat-status-text">Ожидание, пока собеседник примет приглашение...</div>

    <div class="controls" id="inputControls">
        <input type="text" id="messageInput" placeholder="Сообщение, /... или /bin">
        <button onclick="sendMessage()">👉</button>
    </div>

    <script>
        // ⚠️ ВСТАВЬ СЮДА ССЫЛКУ НА СВОЮ БАЗУ
        const DB_BASE_URL = 'https://aidanilchats-default-rtdb.firebaseio.com/';

        let myTag = '';
        let targetTag = '';
        let currentChatId = '';
        let loopInterval = null;
        let activeInviteFrom = null; 
        let adminClickCount = 0;
        let typingTimeout = null;
        let globalAudioCtx = null; // Глобальный контекст звука

        const chatDiv = document.getElementById('chat');
        const msgInput = document.getElementById('messageInput');

        // Безопасный запуск аудио на мобилках
        function initAudioOnFirstClick() {
            if (!globalAudioCtx) {
                globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (globalAudioCtx && globalAudioCtx.state === 'suspended') {
                globalAudioCtx.resume();
            }
        }

        async function initUser() {
            let savedTag = localStorage.getItem('aidanil_custom_nickname');
            if (!savedTag || savedTag.trim() === "") savedTag = askForNickname();
            
            myTag = savedTag.trim();
            updateProfileUI();
            initFavorites();
            await checkBanStatus();

            try {
                await fetch(`${DB_BASE_URL}users/${encodeURIComponent(myTag)}.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ active: true })
                });
            } catch (e) {}

            if (loopInterval) clearInterval(loopInterval);
            loopInterval = setInterval(globalTick, 1000);
        }

        function askForNickname() {
            let tag = "";
            while (!tag || tag.trim() === "") {
                tag = prompt("Добро пожаловать в aidanilchats!\nВведите ваш постоянный никнейм:");
                if (tag && tag.trim().toLowerCase() === 'admin') {
                    alert("Ник 'admin' защищен!");
                    tag = "";
                }
            }
            localStorage.setItem('aidanil_custom_nickname', tag.trim());
            return tag;
        }

        function changeNicknameManual() {
            let oldName = localStorage.getItem('aidanil_custom_nickname');
            let newTag = prompt("Введите новый никнейм:", oldName);
            if (newTag && newTag.trim() !== "" && newTag.trim().toLowerCase() !== 'admin') {
                localStorage.setItem('aidanil_custom_nickname', newTag.trim());
                initUser();
            }
        }

        async function checkBanStatus() {
            try {
                const res = await fetch(`${DB_BASE_URL}bans/${encodeURIComponent(myTag)}.json`);
                const banData = await res.json();
                if (banData && banData.isBanned) {
                    if (banData.until === 'forever') {
                        document.getElementById('ban-screen').style.display = 'flex';
                    } else if (Date.now() < banData.until) {
                        const daysLeft = Math.ceil((banData.until - Date.now()) / (1000 * 60 * 60 * 24));
                        document.getElementById('ban-screen').textContent = `Вы заблокированы еще на ${daysLeft} дн.`;
                        document.getElementById('ban-screen').style.display = 'flex';
                    } else {
                        document.getElementById('ban-screen').style.display = 'none';
                        await fetch(`${DB_BASE_URL}bans/${encodeURIComponent(myTag)}.json`, { method: 'DELETE' });
                    }
                } else {
                    document.getElementById('ban-screen').style.display = 'none';
                }
            } catch(e) {}
        }

        async function globalTick() {
            if (!myTag) return;
            await checkBanStatus();

            try {
                const res = await fetch(`${DB_BASE_URL}invites/${encodeURIComponent(myTag)}.json`);
                const inviteData = await res.json();
                if (inviteData && inviteData.status === 'pending') {
                    activeInviteFrom = inviteData.from;
                    document.getElementById('inviter-name').textContent = activeInviteFrom;
                    document.getElementById('invite-box').style.display = 'block';
                } else if (!inviteData) {
                    document.getElementById('invite-box').style.display = 'none';
                }
            } catch(e) {}

            if (currentChatId) {
                checkChatStatusAndLoad();
                checkTypingAndPings();
            }
        }

        async function checkTypingAndPings() {
            try {
                const typeRes = await fetch(`${DB_BASE_URL}typing/${encodeURIComponent(currentChatId)}/${encodeURIComponent(targetTag)}.json`);
                const isTyping = await typeRes.json();
                const typingIndicator = document.getElementById('typing-status');
                
                if (isTyping === true) {
                    typingIndicator.textContent = `✏️ ${targetTag} печатает...`;
                    typingIndicator.style.display = 'block';
                } else {
                    typingIndicator.style.display = 'none';
                }

                const pingRes = await fetch(`${DB_BASE_URL}pings/${encodeURIComponent(currentChatId)}/${encodeURIComponent(myTag)}.json`);
                const hasPing = await pingRes.json();
                
                if (hasPing === true) {
                    await fetch(`${DB_BASE_URL}pings/${encodeURIComponent(currentChatId)}/${encodeURIComponent(myTag)}.json`, {
                        method: 'PUT',
                        body: 'false'
                    });
                    triggerAudioAlert();
                }
            } catch(e) {}
        }

        msgInput.addEventListener('input', () => {
            if (!currentChatId) return;
            fetch(`${DB_BASE_URL}typing/${encodeURIComponent(currentChatId)}/${encodeURIComponent(myTag)}.json`, { method: 'PUT', body: 'true' });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                fetch(`${DB_BASE_URL}typing/${encodeURIComponent(currentChatId)}/${encodeURIComponent(myTag)}.json`, { method: 'PUT', body: 'false' });
            }, 2000);
        });

        function triggerAudioAlert() {
            try {
                document.body.style.background = '#f04747';
                setTimeout(() => { document.body.style.background = '#1e1e24'; }, 500);

                if (!globalAudioCtx) {
                    globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const oscillator = globalAudioCtx.createOscillator();
                const gainNode = globalAudioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, globalAudioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.3, globalAudioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, globalAudioCtx.currentTime + 0.4);

                oscillator.connect(gainNode);
                gainNode.connect(globalAudioCtx.destination);

                oscillator.start();
                oscillator.stop(globalAudioCtx.currentTime + 0.4);
            } catch(e) { console.log("Аудио заблокировано системой мобильного устройства"); }
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (text === '' || !currentChatId) return;
            msgInput.value = '';

            fetch(`${DB_BASE_URL}typing/${encodeURIComponent(currentChatId)}/${encodeURIComponent(myTag)}.json`, { method: 'PUT', body: 'false' });

            if (text.toLowerCase() === '/bin') {
                await fetch(`${DB_BASE_URL}pings/${encodeURIComponent(currentChatId)}/${encodeURIComponent(targetTag)}.json`, { method: 'PUT', body: 'true' });
                return;
            }

            if (text.startsWith('/kick ')) {
                if (myTag !== 'admin') { alert('Ошибка: Только создатель может использовать эту команду!'); return; }
                const param = text.replace('/kick ', '').trim();
                let untilTime = 'forever';
                if (param !== 'z' && !isNaN(param)) {
                    untilTime = Date.now() + (parseInt(param) * 24 * 60 * 60 * 1000);
                }
                await fetch(`${DB_BASE_URL}bans/${encodeURIComponent(targetTag)}.json`, { method: 'PUT', body: JSON.stringify({ isBanned: true, until: untilTime }) });
                alert(`Пользователь ${targetTag} успешно забанен!`);
                return;
            }

            if (text === '/kickkick') {
                if (myTag !== 'admin') return;
                await fetch(`${DB_BASE_URL}bans/${encodeURIComponent(targetTag)}.json`, { method: 'DELETE' });
                alert(`Пользователь ${targetTag} амнистирован!`);
                return;
            }

            if (text.toLowerCase() === '/friends') {
                let favs = JSON.parse(localStorage.getItem('aidanil_favs') || '["admin"]');
                if (!favs.includes(targetTag)) {
                    favs.push(targetTag);
                    localStorage.setItem('aidanil_favs', JSON.stringify(favs));
                    renderFavorites();
                    alert(`Добавлено в избранное! ⭐`);
                }
                return;
            }

            if (text.startsWith('/...')) {
                const parts = text.split('=');
                if (parts.length >= 4 && parts[2].trim().toLowerCase() === 'password') {
                    const secretText = parts[1].trim();
                    const passwordValue = parts[3].trim();
                    sendPayload({ sender: myTag, type: 'secret', text: secretText, pass: passwordValue, timestamp: Date.now() });
                    return;
                }
            }

            sendPayload({ sender: myTag, type: 'text', text: text, timestamp: Date.now() });
        }

        async function sendPayload(payload) {
            const url = `${DB_BASE_URL}chats/${encodeURIComponent(currentChatId)}.json`;
            try { await fetch(url, { method: 'POST', body: JSON.stringify(payload) }); } catch(e){}
        }

        async function loadMessages() {
            const url = `${DB_BASE_URL}chats/${encodeURIComponent(currentChatId)}.json`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!window.unlockedSecrets) window.unlockedSecrets = {};
                chatDiv.innerHTML = '';
                
                if (data) {
                    const keys = Object.keys(data);
                    const msgArray = keys.map(key => ({ id: key, ...data[key] }));
                    msgArray.sort((a, b) => a.timestamp - b.timestamp);

                    msgArray.forEach(msg => {
                        const msgHtml = document.createElement('div');
                        msgHtml.className = msg.sender === myTag ? 'msg me' : 'msg other';
                        
                        if (msg.type === 'secret') {
                            if (window.unlockedSecrets[msg.id]) {
                                msgHtml.textContent = `🔓 [Секрет]: ${msg.text}`;
                                msgHtml.className += ' secret-unlocked';
                            } else {
                                msgHtml.classList.add('secret-locked');
                                msgHtml.textContent = '🔒 Скрытое сообщение (Нажми, чтобы ввести пароль)';
                                
                                msgHtml.onclick = () => {
                                    const userPass = prompt('Введите секретный пароль для раскрытия сообщения:');
                                    if (userPass !== null && userPass.trim() === String(msg.pass).trim()) {
                                        window.unlockedSecrets[msg.id] = true;
                                        msgHtml.textContent = `🔓 [Секрет]: ${msg.text}`;
                                        msgHtml.onclick = null;
                                        msgHtml.className = (msg.sender === myTag ? 'msg me ' : 'msg other ') + 'secret-unlocked';
                                    } else if (userPass !== null) {
                                        alert('Неверный пароль!');
                                    }
                                };
                            }
                        } else {
                            msgHtml.innerHTML = `<div>${escapeHtml(msg.text)}</div>`;
                        }
                        chatDiv.appendChild(msgHtml);
                    });
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            } catch (e) {}
        }

        function handleAdminSecretClick() {
            adminClickCount++;
            if (adminClickCount === 3) {
                adminClickCount = 0;
                let secretCommand = prompt("🔐 Введите секретную команду:");
                if (secretCommand === '/Pravaadmin') {
                    myTag = 'admin';
                    localStorage.setItem('aidanil_custom_nickname', 'admin');
                    updateProfileUI();
                    fetch(`${DB_BASE_URL}users/admin.json`, { method: 'PUT', body: JSON.stringify({ active: true }) });
                    alert("Режим Создателя активирован! 👑");
                }
            }
            setTimeout(() => { adminClickCount = 0; }, 1500);
        }

        function updateProfileUI() {
            const label = document.getElementById('myTagLabel');
            label.textContent = myTag;
            if (myTag.toLowerCase() === 'admin') {
                label.className = "is-admin";
                label.textContent = "⭐️ admin (Создатель)";
            } else {
                label.className = "";
            }
        }

        function initFavorites() {
            let favs = localStorage.getItem('aidanil_favs');
            if (!favs) { favs = ['admin']; localStorage.setItem('aidanil_favs', JSON.stringify(favs)); }
            renderFavorites();
        }

        function renderFavorites() {
            const listDiv = document.getElementById('favorites-list');
            listDiv.innerHTML = '';
            const arr = JSON.parse(localStorage.getItem('aidanil_favs') || '["admin"]');
            arr.forEach(name => {
                const item = document
